<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Workout - Fitness App</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Playfair+Display&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/styles/tokens.css">
    <link rel="stylesheet" href="/styles/page.css">

    <script type="importmap">
    {
      "imports": {
        "@unbndl/auth": "https://unpkg.com/@unbndl/auth",
        "@unbndl/html": "https://unpkg.com/@unbndl/html",
        "@unbndl/view": "https://unpkg.com/@unbndl/view"
      }
    }
    </script>

    <script type="module">
      import { define } from "@unbndl/html";
      import { Auth } from "@unbndl/auth";
      import { HeaderElement } from "/js/header.js";
      import { ExerciseLinkElement } from "/js/exercise-link.js";
      import { ExerciseListElement } from "/js/exercise-list.js";

      define({
        "auth-provider": Auth.Provider,
        "fit-header": HeaderElement,
        "fit-exercise-link": ExerciseLinkElement,
        "fit-exercise-list": ExerciseListElement
      });
    </script>
  </head>

  <body>
    <auth-provider>
      <label class="mode-toggle" id="mode-toggle">
        <input type="checkbox" id="dark-mode-input" autocomplete="off">
        Dark mode
      </label>

      <fit-header></fit-header>

      <h1>Workout: Upper Body Day</h1>
      <svg class="icon"><use href="/icons/fitness.svg#icon-dumbbell"></use></svg>
      <h2>Exercises</h2>

      <fit-exercise-list src="/api/exercises"></fit-exercise-list>

      <p>
        <a href="plan1.html">Part of Plan</a>
      </p>
      <p>
        <a href="user1.html">Back to User</a>
      </p>
    </auth-provider>

    <script src="/scripts/darkmode.js"></script>
  </body>
</html>
