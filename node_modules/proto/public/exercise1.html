<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Exercise - Fitness App</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Playfair+Display&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/styles/tokens.css">
    <link rel="stylesheet" href="/styles/page.css">

    <script type="importmap">
    {
      "imports": {
        "@unbndl/auth": "https://unpkg.com/@unbndl/auth",
        "@unbndl/html": "https://unpkg.com/@unbndl/html",
        "@unbndl/view": "https://unpkg.com/@unbndl/view"
      }
    }
    </script>

    <script type="module">
      import { define } from "@unbndl/html";
      import { Auth } from "@unbndl/auth";
      import { HeaderElement } from "/js/header.js";

      define({
        "auth-provider": Auth.Provider,
        "fit-header": HeaderElement
      });
    </script>
  </head>

  <body>
    <auth-provider>
      <label class="mode-toggle" id="mode-toggle">
        <input type="checkbox" id="dark-mode-input" autocomplete="off">
        Dark mode
      </label>

      <fit-header></fit-header>

      <h1>Exercise: Push-up</h1>

      <p>Targets: Chest, Arms</p>

      <p>
        <a href="workout1.html">Used in Plan</a>
      </p>
    </auth-provider>

    <script src="/scripts/darkmode.js"></script>
  </body>
</html>
